tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: organisation
            field:
              type: text
              display: 'Votre nom & prénom et/ou organisation'
          -
            handle: email
            field:
              input_type: email
              type: text
              display: 'Votre adresse email'

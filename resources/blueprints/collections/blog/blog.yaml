title: 'Blog Article'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: author
            field:
              type: users
              display: Author
              default: current
              localizable: true
              max_items: 1
          -
            handle: featured_image
            field:
              max_files: 1
              container: assets
              type: assets
              display: 'Featured Image'
              folder: blog
          -
            handle: content
            field:
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - removeformat
                - quote
                - anchor
                - table
                - alignleft
                - aligncenter
                - alignright
                - horizontalrule
                - image
              remove_empty_nodes: false
              type: bard
              display: Content
              link_collections:
                - blog
              container: assets
              sets:
                html:
                  display: HTML
                  sets:
                    html:
                      display: html
                      fields:
                        -
                          handle: markup
                          field:
                            type: code
                            display: markup
          -
            handle: template
            field:
              type: template
              display: Template
              localizable: true
      -
        display: SEO
        fields:
          -
            import: seo_fields
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              validate:
                - required
          -
            handle: tags
            field:
              type: terms
              taxonomies:
                - tags
              display: Tags
              mode: select
          -
            handle: categories
            field:
              type: terms
              taxonomies:
                - categories
              display: Categories
              mode: select

title: Faq
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
          -
            handle: question
            field:
              type: text
              validate:
                - required
              display: Question
          -
            handle: answer
            field:
              remove_empty_nodes: false
              type: bard
              display: Answer
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'

<div class="container">
    <div class="py-[60px] md:py-[100px]">
        {{# 1. Titre de la ville #}}
        <h1 class="text-4xl md:text-5xl font-bold mb-4">{{ title }}</h1>
        
        {{# 2. Texte SEO Unique #}}
        {{ if texte_seo }}
            <div class="seo-content mt-4 mb-8 prose max-w-none">
                {{ texte_seo }}
            </div>
        {{ /if }}

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
            {{# 3. Liste des articles (avec le bon handle: blog) #}}
            {{ collection:blog taxonomy:tags="{slug}" }}
                <article class="border rounded-lg p-6 hover:shadow-lg transition">
                    <h2 class="text-xl font-semibold mb-2">
                        <a href="{{ url }}" class="hover:text-blue-600">{{ title }}</a>
                    </h2>
                    <a href="{{ url }}" class="text-blue-600 hover:underline font-semibold">Lire l'article →</a>
                </article>
            {{ /collection:blog }}
        </div>
    </div>
</div>

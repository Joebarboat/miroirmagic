        text: "Juan-les-Pins en saison, le Fort Carré pour les séminaires d'exception, les villas du Cap — Antibes concentre des formats événementiels très disparates dans un périmètre restreint. Nous y intervenons régulièrement sur des réceptions privées où l'accès au domaine impose un protocole de livraison anticipé. La configuration des terrasses en belvédère, fréquente sur le Cap, exige de positionner le miroir à l'écart des zones exposées au vent dominant. Les articles ici documentent ces contextes spécifiques."

    content:
      -
        type: text
        text: "La Croisette impose ses propres règles : horaires de chargement stricts dans les palaces, sols en marbre qui interdisent tout ancrage, flux d'invités dense qui suppose une installation finalisée avant l'ouverture des portes. Depuis 2017, nous avons rodé nos procédures sur les formats cannois — galas d'entreprise, mariages au Martinez, événements liés au Festival. Les articles de cette section traitent de ces contextes, du choix du dispositif jusqu'aux contraintes logistiques propres aux établissements de la Croisette."
